<html>

<head>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Smythe&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <img src="images/header.png" alt="Restaurant Header">
    </header>
    <main>
        <div class="container">
            <div id="items-menu"></div>
     
        <div class="order-info">
            <h1>Your Order</h1>
            <div class="ordered-items">
                <div class="item-info">
                    <div>
                    <h1 class="item-name">pizza</h1>
                    <button class="remove-btn" id="remove-btn">remove</button>
                    </div>
                    <p class="price">$14</p>
                </div>

            </div>
            <div class="total-price">
                <h1>Total Price:</h1>
                <p class="price">$14</p>

            </div>

        </div>
        <button class="btn-large complete-order" id="complete-order">Complete Order</button>
   </div>
   <div class="modal-container">
    <div class="modal">
        <h2>Enter Card Details</h2>
        <input type="text"  placeholder="Enter your name" name="name" id="name-input" required>
        <input type="number"  placeholder="Enter your card number" name="cardNumber" id="card-input" required>
        <input type="number" placeholder="Enter CVV" name="cvv" id="cvv-input" required minlength="3" maxlength="3">
        <button class="btn-large pay-btn" id="pay-btn">Pay</button>
    </div>
   </div>
    </main>
    <script src="index.js" type="module"></script>
</body>

</html>
